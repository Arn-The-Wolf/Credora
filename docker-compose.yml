services:
  postgres:
    image: postgres:16-alpine
    dns:
      - 8.8.8.8
      - 8.8.4.4
    environment:
      POSTGRES_DB: credora
      POSTGRES_USER: credora
      POSTGRES_PASSWORD: credora
    ports:
      - "5432:5432"
    volumes:
      - credora_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U credora -d credora"]
      interval: 5s
      timeout: 5s
      retries: 10

  ai:
    build: ./ai
    dns:
      - 8.8.8.8
      - 8.8.4.4
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: credora
      MINIO_ROOT_PASSWORD: credora-minio-secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - credora_minio:/data

  mailhog:
    image: mailhog/mailhog:latest
    ports:
      - "1025:1025"
      - "8025:8025"

  backend:
    build: ./backend
    dns:
      - 8.8.8.8
      - 8.8.4.4
    ports:
      - "8080:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      DATABASE_URL: jdbc:postgresql://postgres:5432/credora
      DATABASE_USER: credora
      DATABASE_PASSWORD: credora
      JWT_SECRET: credora-dev-secret-change-in-production-min-32-chars
      AI_SERVICE_URL: http://ai:8000
      STORAGE_MODE: s3
      STORAGE_ENDPOINT: http://minio:9000
      STORAGE_ACCESS_KEY: credora
      STORAGE_SECRET_KEY: credora-minio-secret
      STORAGE_BUCKET: credora-docs
      EMAIL_MODE: smtp
      SMTP_HOST: mailhog
      SMTP_PORT: 1025
      REQUIRE_EMAIL_VERIFICATION: "false"
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
      ai:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend/credora
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8080
    dns:
      - 8.8.8.8
      - 8.8.4.4
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: credora-nextauth-dev-secret-min-32-chars-long
    depends_on:
      - backend

volumes:
  credora_pg:
  credora_minio:
